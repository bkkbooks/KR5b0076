body:
  text: 上清豁落七元符太上洞玄靈寶大綱鈔上清太一金闕玉璽金真紀上清豁落七元符右此一條篆畫自佩本以日月五星為七元其外復六符應是消魔經中符但消魔經凡有四十九符其經中皆空處置而各有廣俠今此示有數枚餘皆零落又一黃符相傳云是真誥中所出太極真人勑鄷都北帝符在玉馬經上者未詳審是不七元符依世經中粗有施用法而今是佩本故無説謂冝且依真誥用雜色書雜綵絹上受而佩之勑鄷都一符真譜云盛以重紫之囊佩之頭上上清豁落七元符
  hash: sha256:034cb102a5b5e2838ef97ee1134cd83139721edab354a6e3339c4a7227efdb68

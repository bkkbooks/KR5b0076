body:
  text: 上清豁落七元符太上洞玄靈寳大綱鈔上清太一金闕玉璽金眞紀上清豁落七元符右此一條篆畫自佩本以日月五星爲七元其外復六符應是消魔經中符但消魔經凡有四十九符其經中皆空處置而各有廣俠今此示有數枚餘皆零落又一黄符相傳云是眞誥中所岀太極眞人勑鄷都北帝符在玉馬經上者未詳審是不七元符依世經中粗有施用法而今是佩本故無説謂冝且依眞誥用雜色書雜綵絹上受而佩之勑鄷都一符眞譜云盛以重紫之囊佩之頭上上清豁落七元符
  hash: sha256:1e4e46a065ebbc130431d5d5f048887b5c9b889451cc0e9454136e4e11785650
